name: Build the project and deploy to GitHub Pages

# Runs the workflow on pushes and pull requests to the main branch.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow.

# Cancel in-progress runs when a new run is triggered on the same PR or branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Sets permissions of the `GITHUB_TOKEN` to allow deployment to GitHub Pages.
permissions:
  contents: read # Read access to repository contents.
  id-token: write # Required to upload the site to GitHub Pages.
  pages: write # Write access to GitHub Pages.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags.
      - name: Install Nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0
      - name: Cache Nix store
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile install nixpkgs#devenv
      - name: Cache Lean dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .lake
          # Include OS, architecture, Lean toolchain, Lake manifest, and git commit hash.
          key: ${{ runner.os }}-lake-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          # If no exact match is found, fallback to the latest commit with the same previous
          # components.
          restore-keys: ${{ runner.os }}-lake-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}
      - name: Build the Lean project within devenv
        run: devenv shell just -- build
      # TODO: The following step is a workaround to avoid an intermittent issue where the
      # documentation build fails because Lake regenerates UnicodeBasic dynlibs from a partial
      # cache without linking its C FFI library. Cleaning the build cache forces a correct rebuild.
      # The following issue may be related:
      #   https://github.com/fgdorais/lean4-unicode-basic/issues/81
      - name: Clean UnicodeBasic build cache
        run: rm -rf .lake/packages/UnicodeBasic/.lake/build
      - name: Build the Lean documentation within devenv
        run: devenv shell just -- docs
      - name: Build the Lean Blueprint PDF and web within devenv
        run: devenv shell just -- blueprint
      - name: Build the project website within devenv
        shell: devenv shell bash -- -e {0}
        env:
          JEKYLL_GITHUB_TOKEN: ${{ github.token }} # Pass the GitHub token to Jekyll.
        run: just website production
      - name: Upload the site as a GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: website/_site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
